name: Deploy (prod)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch, tag, or commit SHA) to deploy'
        required: false
        default: 'main'

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Validate required variables
        shell: bash
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
          ECS_SERVICE: ${{ vars.ECS_SERVICE }}
        run: |
          set -euo pipefail
          : "${AWS_REGION:?Set repo variable AWS_REGION}"
          : "${AWS_ROLE_TO_ASSUME:?Set repo variable AWS_ROLE_TO_ASSUME}"
          : "${ECR_REPOSITORY:?Set repo variable ECR_REPOSITORY}"
          : "${ECS_CLUSTER:?Set repo variable ECS_CLUSTER}"
          : "${ECS_SERVICE:?Set repo variable ECS_SERVICE}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install jq
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Resolve deploy image
        id: resolve_image
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          INPUT_REF: ${{ inputs.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          REQUESTED_REF="${INPUT_REF:-$GITHUB_REF_NAME}"
          REQUESTED_REF="${REQUESTED_REF:-$GITHUB_SHA}"

          IMAGE_SHA="$(git rev-parse HEAD)"
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY"
          IMAGE="$IMAGE_URI:$IMAGE_SHA"

          {
            echo "requested_ref=$REQUESTED_REF"
            echo "image_sha=$IMAGE_SHA"
            echo "image=$IMAGE"
          } >> "$GITHUB_OUTPUT"

      - name: Check image tag in ECR
        id: image_exists
        shell: bash
        env:
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_SHA: ${{ steps.resolve_image.outputs.image_sha }}
        run: |
          set -euo pipefail

          if aws ecr describe-images --repository-name "$ECR_REPOSITORY" --image-ids imageTag="$IMAGE_SHA" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        if: steps.image_exists.outputs.exists != 'true'
        shell: bash
        env:
          IMAGE: ${{ steps.resolve_image.outputs.image }}
        run: |
          set -euo pipefail

          docker build \
            -t "$IMAGE" \
            .

          docker push "$IMAGE"

      - name: Reuse existing image tag
        if: steps.image_exists.outputs.exists == 'true'
        shell: bash
        env:
          IMAGE: ${{ steps.resolve_image.outputs.image }}
        run: |
          set -euo pipefail
          echo "Image already exists in ECR, skipping build/push: $IMAGE"

      - name: Register new task definition revision
        id: register_task_definition
        shell: bash
        env:
          IMAGE: ${{ steps.resolve_image.outputs.image }}
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
          ECS_SERVICE: ${{ vars.ECS_SERVICE }}
        run: |
          set -euo pipefail

          CURRENT_TD_ARN="$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" --query 'services[0].taskDefinition' --output text)"
          aws ecs describe-task-definition --task-definition "$CURRENT_TD_ARN" --query 'taskDefinition' > taskdef.json

          jq --arg IMAGE "$IMAGE" '
            .containerDefinitions |= map(if .name == "drasil" then .image = $IMAGE else . end)
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)
          ' taskdef.json > taskdef.new.json

          NEW_TD_ARN="$(aws ecs register-task-definition --cli-input-json file://taskdef.new.json --query 'taskDefinition.taskDefinitionArn' --output text)"
          echo "Registered task definition: $NEW_TD_ARN"
          echo "task_definition_arn=$NEW_TD_ARN" >> "$GITHUB_OUTPUT"

      - name: Run Prisma migrations
        shell: bash
        env:
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
          ECS_SERVICE: ${{ vars.ECS_SERVICE }}
          NEW_TD_ARN: ${{ steps.register_task_definition.outputs.task_definition_arn }}
        run: |
          set -euo pipefail

          SERVICE_JSON="$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" --query 'services[0]' --output json)"
          LAUNCH_TYPE="$(jq -r '.launchType // empty' <<<"$SERVICE_JSON")"
          CAPACITY_PROVIDER_STRATEGY="$(jq -c '.capacityProviderStrategy // []' <<<"$SERVICE_JSON")"
          PLATFORM_VERSION="$(jq -r '.platformVersion // "LATEST"' <<<"$SERVICE_JSON")"
          ASSIGN_PUBLIC_IP="$(jq -r '.networkConfiguration.awsvpcConfiguration.assignPublicIp // "DISABLED"' <<<"$SERVICE_JSON")"

          mapfile -t SUBNETS < <(jq -r '(.networkConfiguration.awsvpcConfiguration.subnets // [])[]' <<<"$SERVICE_JSON")
          mapfile -t SECURITY_GROUPS < <(jq -r '(.networkConfiguration.awsvpcConfiguration.securityGroups // [])[]' <<<"$SERVICE_JSON")

          if [ "${#SUBNETS[@]}" -eq 0 ]; then
            echo "Service $ECS_SERVICE does not define awsvpc subnets; cannot run migration task." >&2
            exit 1
          fi

          MIGRATION_OVERRIDES_JSON='{"containerOverrides":[{"name":"drasil","command":["node","-e","const {execSync}=require(\"child_process\");let url=process.env.DATABASE_URL||\"\";url=url.replace(\":6543/\",\":5432/\").replace(\"pgbouncer=true&\",\"\").replace(\"?pgbouncer=true\",\"\").replace(\"&pgbouncer=true\",\"\");execSync(\"npm run prisma:migrate:deploy\",{stdio:\"inherit\",env:{...process.env,DATABASE_URL:url}})"]}]}'

          SUBNET_CSV="$(IFS=,; echo "${SUBNETS[*]}")"
          SECURITY_GROUP_CSV="$(IFS=,; echo "${SECURITY_GROUPS[*]}")"
          NETWORK_CONFIG="awsvpcConfiguration={subnets=[${SUBNET_CSV}],securityGroups=[${SECURITY_GROUP_CSV}],assignPublicIp=${ASSIGN_PUBLIC_IP}}"

          RUN_ARGS=(
            --cluster "$ECS_CLUSTER"
            --task-definition "$NEW_TD_ARN"
            --count 1
            --network-configuration "$NETWORK_CONFIG"
            --overrides "$MIGRATION_OVERRIDES_JSON"
          )

          if [ -n "$LAUNCH_TYPE" ]; then
            RUN_ARGS+=(--launch-type "$LAUNCH_TYPE")
          elif [ "$CAPACITY_PROVIDER_STRATEGY" != "[]" ]; then
            RUN_ARGS+=(--capacity-provider-strategy "$CAPACITY_PROVIDER_STRATEGY")
          else
            echo "Service $ECS_SERVICE defines neither launchType nor capacityProviderStrategy; cannot run migration task safely." >&2
            exit 1
          fi

          if [ "$LAUNCH_TYPE" != "EC2" ]; then
            RUN_ARGS+=(--platform-version "$PLATFORM_VERSION")
          fi

          RUN_TASK_JSON="$(aws ecs run-task "${RUN_ARGS[@]}" --output json)"
          TASK_ARN="$(jq -r '.tasks[0].taskArn // empty' <<<"$RUN_TASK_JSON")"
          if [ -z "$TASK_ARN" ] || [ "$TASK_ARN" = "None" ]; then
            echo "Failed to start migration task." >&2
            jq -r '.failures[]? | "Failure: \(.arn // "unknown") - \(.reason // "unknown")\(if .detail then " (" + .detail + ")" else "" end)"' <<<"$RUN_TASK_JSON" >&2
            exit 1
          fi

          echo "Started migration task: $TASK_ARN"

          MAX_POLLS=180
          POLL_INTERVAL_SECONDS=10
          TASK_JSON=""

          for ((poll=1; poll<=MAX_POLLS; poll++)); do
            TASK_JSON="$(aws ecs describe-tasks --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN" --query 'tasks[0]' --output json)"
            LAST_STATUS="$(jq -r '.lastStatus // empty' <<<"$TASK_JSON")"

            if [ "$LAST_STATUS" = "STOPPED" ]; then
              break
            fi

            if [ "$poll" -eq "$MAX_POLLS" ]; then
              echo "Migration task did not stop within $((MAX_POLLS * POLL_INTERVAL_SECONDS / 60)) minutes." >&2
              echo "Last observed status: ${LAST_STATUS:-unknown}" >&2
              exit 1
            fi

            sleep "$POLL_INTERVAL_SECONDS"
          done

          EXIT_CODE="$(jq -r '.containers[] | select(.name == "drasil") | .exitCode // empty' <<<"$TASK_JSON")"
          STOPPED_REASON="$(jq -r '.stoppedReason // empty' <<<"$TASK_JSON")"
          CONTAINER_REASON="$(jq -r '.containers[] | select(.name == "drasil") | .reason // empty' <<<"$TASK_JSON")"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration task failed with exit code ${EXIT_CODE:-unknown}." >&2
            if [ -n "$STOPPED_REASON" ]; then
              echo "Stopped reason: $STOPPED_REASON" >&2
            fi
            if [ -n "$CONTAINER_REASON" ]; then
              echo "Container reason: $CONTAINER_REASON" >&2
            fi
            exit 1
          fi

          echo "Prisma migrations applied successfully."

      - name: Update ECS service
        shell: bash
        env:
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
          ECS_SERVICE: ${{ vars.ECS_SERVICE }}
          NEW_TD_ARN: ${{ steps.register_task_definition.outputs.task_definition_arn }}
        run: |
          set -euo pipefail

          aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_SERVICE" --task-definition "$NEW_TD_ARN"
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE"

      - name: Deployment summary
        shell: bash
        env:
          REQUESTED_REF: ${{ steps.resolve_image.outputs.requested_ref }}
          IMAGE_SHA: ${{ steps.resolve_image.outputs.image_sha }}
          IMAGE: ${{ steps.resolve_image.outputs.image }}
          IMAGE_EXISTS: ${{ steps.image_exists.outputs.exists }}
        run: |
          set -euo pipefail
          {
            echo "## Deploy target"
            echo "- Requested ref: $REQUESTED_REF"
            echo "- Resolved commit SHA: $IMAGE_SHA"
            echo "- Image: $IMAGE"
            echo "- Image reused from ECR: $IMAGE_EXISTS"
          } >> "$GITHUB_STEP_SUMMARY"
